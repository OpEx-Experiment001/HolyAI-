# Set API Key (Leave blank for local models)
ai.api_key=

# Set the URL
# Ollama default: http://localhost:11434/api/chat
# LM Studio default: http://localhost:1234/v1/chat/completions
# OpenAI cloud: https://api.openai.com/v1/chat/completions
ai.url=http://localhost:11434/api/chat

# Specify the model name (e.g., phi3, gpt-3.5-turbo, llama3)
ai.model=phi3

# Optional: Set a startup command to automatically run a local AI if connection fails
# Examples: "ollama run phi3" or "lmstudio start"
ai.startup_command=ollama run phi3
